name: http-headers-check
description: "Checks HTTP security headers on a given URL"
version: "1.0.0"
input_schema:
  type: object
  properties:
    url:
      type: string
      description: "Target URL to check headers on"
    timeout:
      type: integer
      description: "Request timeout in seconds"
      default: 10
  required:
    - url
output_schema:
  type: object
  properties:
    headers_found:
      type: array
      items:
        type: string
    headers_missing:
      type: array
      items:
        type: string
    severity:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW, INFO]