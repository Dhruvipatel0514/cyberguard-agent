<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberGuard Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#060d12; --bg2:#0a1520; --bg3:#0d1e2e;
  --border:#0e3a52; --accent:#00d4ff; --green:#00ff9d;
  --red:#ff3c6e; --amber:#ffb800; --text:#c8e8f5; --muted:#4a7a90;
}
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }

header { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:60px; border-bottom:1px solid var(--border); background:rgba(6,13,18,0.97); position:relative; z-index:10; }
.brand { display:flex; align-items:center; gap:12px; }
.shield { width:38px; height:38px; }
.brand-name { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; color:var(--accent); letter-spacing:4px; text-shadow:0 0 24px rgba(0,212,255,0.5); }
.brand-sub { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:3px; margin-top:1px; }
.header-right { display:flex; align-items:center; gap:16px; }
.online-badge { display:flex; align-items:center; gap:7px; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--green); letter-spacing:1px; }
.pulse { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.75)} }
.model-tag { font-family:'Share Tech Mono',monospace; font-size:10px; padding:4px 10px; border:1px solid var(--border); border-radius:2px; color:var(--muted); letter-spacing:1px; }

.main { flex:1; display:flex; overflow:hidden; position:relative; z-index:1; }

.sidebar { width:200px; flex-shrink:0; border-right:1px solid var(--border); background:var(--bg2); display:flex; flex-direction:column; padding:16px 0; gap:2px; }
.sidebar-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--muted); padding:0 16px 10px; text-transform:uppercase; }
.skill { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; border:none; background:none; color:var(--muted); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; width:100%; text-align:left; border-left:2px solid transparent; transition:all 0.15s; }
.skill:hover { background:rgba(0,212,255,0.04); color:var(--text); }
.skill.active { background:rgba(0,212,255,0.07); color:var(--accent); border-left-color:var(--accent); }
.skill-ico { font-size:16px; width:20px; text-align:center; }
.sidebar-sep { height:1px; background:var(--border); margin:10px 16px; }
.clear-btn { margin:auto 16px 0; padding:9px; border:1px solid var(--border); background:none; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; cursor:pointer; border-radius:3px; transition:all 0.2s; text-transform:uppercase; }
.clear-btn:hover { border-color:var(--red); color:var(--red); }

.chat { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.messages { flex:1; overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:20px; scroll-behavior:smooth; }
.messages::-webkit-scrollbar { width:4px; }
.messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.welcome { margin:auto; text-align:center; padding:40px 20px; max-width:520px; }
.welcome-shield { font-size:56px; margin-bottom:16px; filter:drop-shadow(0 0 20px rgba(0,212,255,0.6)); }
.welcome h2 { font-family:'Orbitron',monospace; font-size:24px; font-weight:900; color:var(--accent); letter-spacing:4px; margin-bottom:8px; text-shadow:0 0 30px rgba(0,212,255,0.4); }
.welcome p { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:2px; margin-bottom:28px; }
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.qbtn { padding:12px 14px; border:1px solid var(--border); background:var(--bg2); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:500; cursor:pointer; border-radius:4px; text-align:left; transition:all 0.2s; line-height:1.4; }
.qbtn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,0.05); transform:translateY(-2px); }
.qbtn-tag { display:block; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:2px; margin-bottom:4px; text-transform:uppercase; }

.msg { display:flex; gap:12px; animation:msgIn 0.25s ease; max-width:820px; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg.agent { align-self:flex-start; }
.avatar { width:34px; height:34px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono',monospace; font-size:11px; font-weight:700; flex-shrink:0; border:1px solid; }
.msg.agent .avatar { background:rgba(0,212,255,0.1); border-color:var(--accent); color:var(--accent); }
.msg.user  .avatar { background:rgba(0,255,157,0.1); border-color:var(--green);  color:var(--green); }
.bubble-wrap { display:flex; flex-direction:column; gap:4px; max-width:720px; }
.msg.user .bubble-wrap { align-items:flex-end; }
.bubble-meta { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; }
.bubble { padding:14px 18px; border-radius:4px; font-size:14px; line-height:1.7; border:1px solid; white-space:pre-wrap; word-break:break-word; }
.msg.agent .bubble { background:var(--bg2); border-color:var(--border); border-left:2px solid var(--accent); font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--text); }
.msg.user  .bubble { background:rgba(0,255,157,0.05); border-color:rgba(0,255,157,0.2); border-right:2px solid var(--green); font-size:15px; }
.bubble .crit { color:var(--red); font-weight:700; }
.bubble .high { color:#ff8c42; font-weight:700; }
.bubble .med  { color:var(--amber); font-weight:700; }
.bubble .low  { color:var(--green); font-weight:700; }
.bubble .info-c { color:var(--accent); font-weight:700; }

.typing-msg { display:flex; gap:12px; align-self:flex-start; animation:msgIn 0.25s ease; }
.typing-bubble { padding:14px 20px; background:var(--bg2); border:1px solid var(--border); border-left:2px solid var(--accent); border-radius:4px; display:flex; gap:5px; align-items:center; }
.typing-bubble span { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 1.2s infinite; }
.typing-bubble span:nth-child(2) { animation-delay:0.2s; }
.typing-bubble span:nth-child(3) { animation-delay:0.4s; }
@keyframes blink { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }

.input-area { flex-shrink:0; padding:16px 28px 20px; border-top:1px solid var(--border); background:rgba(10,21,32,0.98); }
.skill-chips { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; align-items:center; }
.chip-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:2px; margin-right:4px; }
.chip { padding:3px 10px; border:1px solid var(--border); border-radius:2px; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); cursor:pointer; background:none; letter-spacing:1px; transition:all 0.15s; text-transform:uppercase; }
.chip:hover { border-color:var(--accent); color:var(--accent); }
.chip.on { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,0.08); }
.input-row { display:flex; gap:10px; align-items:flex-end; }
.input-box { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:5px; transition:border-color 0.2s,box-shadow 0.2s; }
.input-box:focus-within { border-color:var(--accent); box-shadow:0 0 18px rgba(0,212,255,0.12); }
textarea { width:100%; background:none; border:none; outline:none; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:500; padding:13px 16px; resize:none; min-height:50px; max-height:130px; line-height:1.5; }
textarea::placeholder { color:var(--muted); }
.send { width:50px; height:50px; border:1px solid var(--accent); background:rgba(0,212,255,0.1); color:var(--accent); border-radius:5px; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.send:hover { background:rgba(0,212,255,0.22); box-shadow:0 0 24px rgba(0,212,255,0.3); transform:translateY(-1px); }
.send:disabled { opacity:0.3; cursor:not-allowed; transform:none; box-shadow:none; }
.input-hint { margin-top:7px; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; }

.right-panel { width:240px; flex-shrink:0; border-left:1px solid var(--border); background:var(--bg2); display:flex; flex-direction:column; overflow-y:auto; }
.rp-section { padding:14px 16px; border-bottom:1px solid var(--border); }
.rp-title { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.stat { background:var(--bg3); border:1px solid var(--border); border-radius:3px; padding:10px 8px; text-align:center; }
.stat-n { font-family:'Orbitron',monospace; font-size:24px; font-weight:700; line-height:1; margin-bottom:3px; }
.stat-l { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.s-crit .stat-n { color:var(--red); text-shadow:0 0 10px rgba(255,60,110,0.4); }
.s-high .stat-n { color:#ff8c42; }
.s-med  .stat-n { color:var(--amber); }
.s-low  .stat-n { color:var(--green); }
.risk-row { display:flex; justify-content:space-between; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:6px; }
.risk-row b { color:var(--red); }
.risk-bar { height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; }
.risk-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--green),var(--amber),var(--red)); transition:width 1s ease; width:0%; }
.finding { padding:9px 10px; border:1px solid var(--border); border-radius:3px; background:var(--bg3); margin-bottom:6px; font-size:12px; }
.finding:last-child { margin-bottom:0; }
.finding-sev { display:inline-block; font-family:'Share Tech Mono',monospace; font-size:9px; font-weight:700; letter-spacing:1px; padding:1px 6px; border-radius:2px; margin-bottom:5px; }
.fc { background:rgba(255,60,110,0.12); color:var(--red);    border:1px solid rgba(255,60,110,0.3); }
.fh { background:rgba(255,140,66,0.12); color:#ff8c42;       border:1px solid rgba(255,140,66,0.3); }
.fm { background:rgba(255,184,0,0.12);  color:var(--amber);  border:1px solid rgba(255,184,0,0.3); }
.fl { background:rgba(0,255,157,0.12);  color:var(--green);  border:1px solid rgba(0,255,157,0.3); }
.fi { background:rgba(0,212,255,0.12);  color:var(--accent); border:1px solid rgba(0,212,255,0.3); }
.finding-title { color:var(--text); line-height:1.3; font-weight:600; }
.no-findings { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); text-align:center; padding:20px 0; letter-spacing:1px; line-height:1.8; }
.export-btn { margin:12px 16px; padding:9px; border:1px solid var(--border); background:none; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; cursor:pointer; border-radius:3px; transition:all 0.2s; width:calc(100% - 32px); text-transform:uppercase; }
.export-btn:hover { border-color:var(--accent); color:var(--accent); }
@media(max-width:768px){ .sidebar,.right-panel{display:none} }
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="shield" viewBox="0 0 38 38" fill="none">
      <polygon points="19,2 35,9 35,22 19,36 3,22 3,9" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <polygon points="19,7 30,13 30,22 19,31 8,22 8,13" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
      <circle cx="19" cy="19" r="6" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1.5"/>
      <circle cx="19" cy="19" r="2.5" fill="#00d4ff"/>
      <line x1="19" y1="2" x2="19" y2="7" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="19" y1="31" x2="19" y2="36" stroke="#00d4ff" stroke-width="1.5"/>
    </svg>
    <div>
      <div class="brand-name">CYBERGUARD</div>
      <div class="brand-sub">Security AI Agent · v1.0.0 · GitAgent Standard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="online-badge"><div class="pulse"></div>ONLINE</div>
    <div class="model-tag">CLAUDE HAIKU 4.5</div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
   
    <div class="sidebar-sep"></div>
    <button class="clear-btn" onclick="clearAll()">⟳ Clear Session</button>
  </div>

  <div class="chat">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-shield">🛡️</div>
        <h2>CYBERGUARD ONLINE</h2>
        <p>AI-POWERED CYBERSECURITY AGENT · GITAGENT STANDARD</p>
        <div class="quick-grid">
          <button class="qbtn" onclick="quick('Scan https://example.com for security vulnerabilities. Check HTTP headers, SSL/TLS, and any CVEs.')">
            <span class="qbtn-tag">vuln-scanner</span>Scan a website for vulnerabilities
          </button>
          <button class="qbtn" onclick="quick('Analyze this IOC: 185.220.101.45 — is this IP malicious? Give MITRE ATT&CK mapping.')">
            <span class="qbtn-tag">threat-intel</span>Analyze a suspicious IP address
          </button>
          <button class="qbtn" onclick="quickCodeAudit()">
  <span class="qbtn-tag">code-auditor</span>Audit code for OWASP issues
</button>
          <button class="qbtn" onclick="quickReport()">
  <span class="qbtn-tag">reporter</span>Generate security report
</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="skill-chips">
        <span class="chip-label">SKILL:</span>
        <button class="chip on" id="c-auto"   onclick="setChip('auto')">Auto</button>
        <button class="chip"    id="c-vuln"   onclick="setChip('vuln-scanner')">Vuln Scan</button>
        <button class="chip"    id="c-intel"  onclick="setChip('threat-intel')">Threat Intel</button>
        <button class="chip"    id="c-code"   onclick="setChip('code-auditor')">Code Audit</button>
        <button class="chip" id="c-script" onclick="setChip('scripting')">Scripting</button>
<button class="chip" id="c-report" onclick="setChip('reporter')">Report</button>
      </div>
      <div class="input-row">
        <div class="input-box">
          <textarea id="inp" placeholder="Enter a URL to scan, suspicious IP, code snippet, or any security question..." onkeydown="onKey(event)" oninput="resize(this)" rows="1"></textarea>
        </div>
        <button class="send" id="sendBtn" onclick="send()">➤</button>
      </div>
      <div class="input-hint">ENTER to send · SHIFT+ENTER for new line</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="rp-section">
      <div class="rp-title"></div>
      <div class="risk-row"><span></span><b id="rScore"></b></div>
      <div class="risk-bar"><div class="risk-fill" id="rFill"></div></div>
    </div>
    <div class="rp-section">
      <div class="rp-title">Severity Count</div>
      <div class="stats">
        <div class="stat s-crit"><div class="stat-n" id="nCrit">0</div><div class="stat-l">Critical</div></div>
        <div class="stat s-high"><div class="stat-n" id="nHigh">0</div><div class="stat-l">High</div></div>
        <div class="stat s-med"> <div class="stat-n" id="nMed">0</div> <div class="stat-l">Medium</div></div>
        <div class="stat s-low"> <div class="stat-n" id="nLow">0</div> <div class="stat-l">Low</div></div>
      </div>
    </div>
    <div class="rp-section" style="flex:1">
      <div class="rp-title"><span id="fBadge" style="color:var(--accent)"></span></div>
      <div id="findingsList"><div class="no-findings"><br><br></div></div>
    </div>
    <button class="export-btn" onclick="exportMd()">⬇ Export Report</button>
  </div>
</div>

<script>
window.onload = function () {
  const saved = localStorage.getItem("cyberguard_chat");

  if (saved) {
    history = JSON.parse(saved);

    history.forEach(msg => {
      if (msg.role === "user") {
        addUser(msg.content);
      } else if (msg.role === "assistant") {
        addAgent(msg.content);
      }
    });
  }
};
const SYSTEM = `You are CyberGuard, a cybersecurity AI assistant.
Provide direct, clear, and real answers to all cybersecurity questions.
You can list attack names, threats, and concepts.
Do not give step-by-step instructions for illegal activities.`;
let skill='auto', history=[], findings=[], counts={CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0}, busy=false;

function setSkill(s,btn){ skill=s; document.querySelectorAll('.skill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); setChip(s); }
function setChip(s){
  skill=s;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  const cm={auto:'c-auto','vuln-scanner':'c-vuln','threat-intel':'c-intel','code-auditor':'c-code','reporter':'c-report'};
  const el=document.getElementById(cm[s]); if(el) el.classList.add('on');
  const sm={auto:'sk-auto','vuln-scanner':'sk-vuln','threat-intel':'sk-intel','code-auditor':'sk-code','reporter':'sk-report'};
  document.querySelectorAll('.skill').forEach(b=>b.classList.remove('active'));
  const sel=document.getElementById(sm[s]); if(sel) sel.classList.add('active');
}
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
function quick(txt){ document.getElementById('inp').value=txt; send(); }
function saveChat() {
  localStorage.setItem("cyberguard_chat", JSON.stringify(history));
}
function quickCodeAudit(){
  const txt = `Audit this code:
query = "SELECT * FROM users WHERE id=" + user_input
password = "admin123"
os.system("ping " + user_input)`;
  quick(txt);
}
function quickReport(){
  quick('Generate a complete professional security report of all findings from this session.');
}
async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if(!txt) return;

  addUser(txt);
  inp.value = ''; inp.style.height = 'auto';

  history.push({ role: 'user', content: txt });
  localStorage.setItem('cyberguard_chat', JSON.stringify(history));

  showTyping();
  document.getElementById('sendBtn').disabled = true;

  try {
    const reply = await callClaude({
      messages: [
        { role: 'system', content: SYSTEM },
        ...history
      ]
    });

    removeTyping();
    addAgent(reply);

    history.push({ role: 'assistant', content: reply });
    localStorage.setItem('cyberguard_chat', JSON.stringify(history));
  } catch(e) {
    removeTyping();
    addAgent('ERROR: ' + e.message);
  }

  document.getElementById('sendBtn').disabled = false;
}
async function callClaude(){
 const res = await fetch('http://localhost:3000/api/chat', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
  messages: [
    { role: "system", content: SYSTEM },
    ...history
  ]
})
});

  if(!res.ok){
    throw new Error('Server error');
  }

  const data = await res.json();
  return data.reply;
}

async function demo(txt){
  return "⚠️ Backend not connected. Please start your server to get real AI responses.";
}

function parseFindings(txt){
  const blocks=txt.match(/FINDING #\d+[\s\S]*?(?=FINDING #\d+|$)/g)||[];
  blocks.forEach(b=>{
    const sev=(b.match(/Severity:\s*(CRITICAL|HIGH|MEDIUM|LOW|INFO)/i)||[])[1]?.toUpperCase();
    const title=(b.match(/Title:\s*(.+)/)||[])[1];
    if(sev&&title){ if(sev in counts) counts[sev]++; findings.push({sev,title}); }
  });
  const sc=(txt.match(/(?:Threat |Risk )?Score:\s*(\d+)\/100/i)||[])[1]||(txt.match(/Score:\s*(\d+)/i)||[])[1];
  if(sc){ const n=parseInt(sc); document.getElementById('rFill').style.width=n+'%'; document.getElementById('rScore').textContent=n+'/100'; }
  document.getElementById('nCrit').textContent=counts.CRITICAL;
  document.getElementById('nHigh').textContent=counts.HIGH;
  document.getElementById('nMed').textContent=counts.MEDIUM;
  document.getElementById('nLow').textContent=counts.LOW;
  document.getElementById('fBadge').textContent=`(${findings.length})`;
  if(findings.length>0) renderFindings();
}

function renderFindings(){
  const cls={CRITICAL:'fc',HIGH:'fh',MEDIUM:'fm',LOW:'fl',INFO:'fi'};
  document.getElementById('findingsList').innerHTML=findings.slice().reverse().map(f=>`<div class="finding"><div class="finding-sev ${cls[f.sev]||'fi'}">${f.sev}</div><div class="finding-title">${esc(f.title)}</div></div>`).join('');
}

function addUser(txt){
  const m=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="avatar">YOU</div><div class="bubble-wrap"><div class="bubble-meta">YOU · ${time()}</div><div class="bubble">${esc(txt)}</div></div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}

function addAgent(txt){
  const m=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg agent';
  const html=esc(txt).replace(/\bCRITICAL\b/g,'<span class="crit">CRITICAL</span>').replace(/\bHIGH\b/g,'<span class="high">HIGH</span>').replace(/\bMEDIUM\b/g,'<span class="med">MEDIUM</span>').replace(/\bLOW\b/g,'<span class="low">LOW</span>').replace(/\bINFO\b/g,'<span class="info-c">INFO</span>');
  d.innerHTML=`<div class="avatar">CG</div><div class="bubble-wrap"><div class="bubble-meta">CYBERGUARD · ${time()}</div><div class="bubble">${html}</div></div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}

function showTyping(){
  const m=document.getElementById('messages');
  const d=document.createElement('div'); d.className='typing-msg'; d.id='typing';
  d.innerHTML=`<div class="avatar" style="width:34px;height:34px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid var(--accent);background:rgba(0,212,255,0.1);color:var(--accent)">CG</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}

function removeTyping(){ document.getElementById('typing')?.remove(); }

function clearAll(){
  document.getElementById('messages').innerHTML='';
  history=[];
  findings=[];
  counts={CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0};
  ['nCrit','nHigh','nMed','nLow'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('fBadge').textContent='(0)';
  document.getElementById('rFill').style.width='0%';
  document.getElementById('rScore').textContent='0/100';
  document.getElementById('findingsList').innerHTML='<div class="no-findings">NO FINDINGS YET<br>Run a scan to<br>populate this panel</div>';

  // 🔥 Add this line to truly clear session
  localStorage.removeItem("cyberguard_chat");
}
function exportMd(){
  if(!history.length){alert('No session to export yet.');return;}
  const md=`# CyberGuard Security Report\nDate: ${new Date().toLocaleString()}\n\n`+history.map(h=>`## ${h.role.toUpperCase()}\n${h.content}`).join('\n\n---\n\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'})); a.download=`cyberguard-report-${Date.now()}.md`; a.click();
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function time(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
</script>
